<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WebGL Live2D viewer supporting Cubism 2, Cubism 3, and Spine 2.x skeletal animation via PixiJS v6.">
  <title>Live2D Viewer - Cubism 2, Cubism 3 &amp; Spine</title>
  <link rel="icon" type="image/png" href="icon.png">
  <script>
    (function() {
      var theme = localStorage.getItem('live2d-viewer-theme') || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/mobile.css">
</head>
<body>

  <!-- Canvas container — PIXI.Application resizeTo targets this element -->
  <div id="canvas-wrap"></div>
  
  <div id="loading-spinner" aria-hidden="true" style="display: none;">
    <img src="gfl-spinner.svg" alt="Loading...">
  </div>

  <div id="info" role="status" aria-live="polite">Loading…</div>

  <header id="toolbar" role="banner">
    <div id="toolbar-left">
      <button id="theme-toggle" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">☀</button>
      <button id="pan-toggle" aria-label="Toggle Pan/Zoom mode" title="Toggle Pan/Zoom mode" aria-pressed="false">🔎 Pan/Zoom</button>
      <button id="reset-view" aria-label="Reset View" title="Reset View">⟲ Reset</button>
    </div>
    <div id="toolbar-right">
      <a id="github-link" href="https://github.com/4163/pixijs-live2d-spine-viewer" aria-label="GitHub repository" title="GitHub repository" target="_blank"><svg viewBox="0 0 16 16" width="16" height="16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>&nbsp;GitHub</a>
    </div>
  </header>
  <script>(function(){var t=document.documentElement.getAttribute('data-theme');var b=document.getElementById('theme-toggle');if(b)b.textContent=t==='light'?'🌙':'☀';})();</script>

  <!-- Bottom navigation: mode tabs + model pills (desktop) / dropdown (mobile) -->
  <nav id="model-nav" aria-label="Model navigation">
    <div id="mode-tabs" role="tablist">
      <div class="wrapper">
        <button class="mode-tab active" data-mode="live2d" role="tab" aria-selected="true">Live2D</button>
        <button class="mode-tab"        data-mode="spine"  role="tab" aria-selected="false">Spine</button>
      </div>
      <button id="dorm-toggle" class="mode-tab hidden" role="tab" aria-label="Toggle Dorm/Battle mode" title="Toggle Dorm/Battle mode">Dorm</button>
    </div>

    <!-- Desktop: pill buttons per model (populated by main.js) -->
    <div id="model-pills" role="group" aria-label="Model selection"></div>

    <!-- Mobile: visible dropdown (shown via CSS at max-width 767px) -->
    <select id="model-select-visible" aria-label="Select model"></select>

    <!-- Hidden selects — kept for test-visual.mjs / verify.mjs compatibility -->
    <select id="model-select" aria-label="Hidden model select (tests only)"></select>
    <select id="mode-select"  aria-label="Hidden mode select (tests only)">
      <option value="live2d">live2d</option>
      <option value="chibi">chibi</option>
    </select>
  </nav>

  <!-- ═══════════════════════════════════════════
       Third-party libraries (synchronous globals)
       Must load in order — cannot be deferred.
       ═══════════════════════════════════════════ -->

  <!-- Cubism 2 SDK — exposes window.Live2D -->
  <script src="lib/live2d.min.js"></script>

  <!-- Cubism 4 SDK — exposes window.Live2DCubismCore (for Cubism 3 models) -->
  <script src="lib/live2dcubismcore.min.js"></script>

  <!-- PixiJS v6 -->
  <script src="lib/pixi.min.js"></script>

  <!-- Node.js process shim (required by pixi-live2d-display module format) -->
  <script>
    window.process = window.process || { env: { NODE_ENV: 'production' }, browser: true, version: '' };
  </script>

  <!-- pixi-live2d-display v0.5.0-beta — dual Cubism 2 + 3 support -->
  <script src="lib/pixi-live2d-display.min.js"></script>

  <!--
    PixiJS v6 compatibility stubs for pixi-spine.js
    ─────────────────────────────────────────────────
    pixi-spine is a v4-era build targeting PixiJS v4 APIs.
    These stubs silence the loader registration calls that
    were removed in PixiJS v6. They do NOT affect rendering.

    DO NOT replace pixi-spine.js with pixi-spine v3:
    v3 dropped Spine 2.x JSON parsing (flipX timeline type),
    which is required for our Spine 2.1.27 chibi models.
    See README.md → Known Issues for the full explanation.
  -->
  <script>
    if (!PIXI.loaders) PIXI.loaders = { Loader: { addPixiMiddleware() {} } };
    if (!PIXI.loader)  PIXI.loader  = { use() {} };
    if (!PIXI.mesh)    PIXI.mesh    = {};
    if (!PIXI.mesh.Mesh) {
      PIXI.mesh.Mesh = PIXI.SimpleMesh;
      PIXI.mesh.Mesh.DRAW_MODES = PIXI.DRAW_MODES || { TRIANGLES: 0 };
    }
  </script>

  <!-- pixi-spine (v4 build) — exposes PIXI.spine.SpineRuntime for Spine 2.x -->
  <script src="lib/pixi-spine.js"></script>

  <!-- Spine 2.1.27 binary parser — converts .skel binary → JSON for pixi-spine -->
  <script src="lib/spine2-skeleton-binary.js"></script>

  <!-- ═══════════════════════════════
       App scripts (deferred)
       Depend only on the globals above.
       ═══════════════════════════════ -->

  <!-- Model asset cache intercepts XHRLoader and fetch -->
  <script src="js/cache.js" defer></script>

  <!-- User-editable model list and layout overrides -->
  <script src="js/config.js" defer></script>

  <!-- Live2D (Cubism 2 + 3) viewer logic -->
  <script src="js/app.js" defer></script>

  <!-- Spine skeletal animation viewer logic -->
  <script src="js/chibi.js" defer></script>

  <!-- Experimental Playground Mode -->
  <script src="js/playground.js" defer></script>

  <!-- Resize handler -->
  <script src="js/resize.js" defer></script>

  <!-- Pan & Zoom module — pointer drag + scroll-to-zoom on the PIXI canvas -->
  <script src="js/pan-zoom.js" defer></script>

  <!-- PIXI init, mode switching, theme toggle, UI wiring -->
  <script src="js/main.js" defer></script>

</body>
</html>
